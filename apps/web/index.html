<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifest Lens</title>
    <style>
      :root {
        color-scheme: dark;
        --color-bg-canvas: #121214;
        --color-bg-tree-pane: #16161a;
        --color-bg-panel: #1b1b20;
        --color-bg-header: #0d0d0f;
        --color-bg-elevated: #202027;
        --color-border-hairline: #2a2a31;
        --color-border-focus: #5eead4;
        --color-text-primary: #ededef;
        --color-text-secondary: #a6a6ae;
        --color-text-tertiary: #6e6e78;
        --color-text-explanation: #d9d9de;
        --color-accent-primary: #5eead4;
        --color-accent-error: #f87171;
        --font-sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      }

      [hidden] {
        display: none !important;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        height: 100dvh;
        overflow: hidden;
        color: var(--color-text-primary);
        background: var(--color-bg-canvas);
        font-family: var(--font-sans);
      }

      button,
      input {
        font: inherit;
      }

      button:focus-visible {
        outline: 2px solid var(--color-border-focus);
        outline-offset: 2px;
      }

      .app-frame {
        height: 100dvh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 10;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 24px;
        background: var(--color-bg-header);
        border-bottom: 1px solid var(--color-border-hairline);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 999px;
        background: var(--color-accent-primary);
      }

      .brand-name {
        margin: 0;
        color: var(--color-text-primary);
        font-size: 16px;
        font-weight: 600;
        line-height: 24px;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 16px;
        flex: none;
      }

      button,
      .upload-button {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        line-height: 20px;
      }

      #clear-button,
      #load-sample-button {
        color: var(--color-text-secondary);
        background: transparent;
      }

      #clear-button:hover,
      #load-sample-button:hover {
        color: var(--color-text-primary);
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      .upload-button {
        color: var(--color-bg-header);
        background: var(--color-accent-primary);
      }

      .upload-button:hover {
        filter: brightness(1.08);
      }

      .visually-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        margin: -1px !important;
        padding: 0 !important;
        overflow: hidden !important;
        clip-path: inset(50%) !important;
        border: 0 !important;
        white-space: nowrap !important;
      }

      #app {
        min-height: 0;
        height: 100%;
        overflow: hidden;
        margin: 0 auto;
        width: min(1440px, 100%);
      }

      .inspector-shell {
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: var(--color-bg-tree-pane);
        border-left: 1px solid var(--color-border-hairline);
        border-right: 1px solid var(--color-border-hairline);
      }

      #inspector-host,
      #inspector-host manifest-inspector {
        height: 100%;
        min-height: 0;
      }

      @media (max-width: 1199px) {
        .app-header {
          padding: 0 16px;
        }
      }

      @media (max-width: 767px) {
        .app-header {
          height: 48px;
          gap: 10px;
        }

        .brand-name {
          font-size: 14px;
        }

        .header-actions {
          gap: 6px;
        }

        #load-sample-button {
          display: none !important;
        }

        #clear-button {
          padding-inline: 10px;
        }

        .upload-button {
          padding-inline: 12px;
        }

        .inspector-shell {
          border: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body,
        .app-frame,
        .inspector-shell {
          scroll-behavior: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-frame">
      <header class="app-header">
        <div class="brand" aria-label="Manifest Lens">
          <span class="brand-mark" aria-hidden="true"></span>
          <p class="brand-name">Manifest Lens</p>
        </div>
        <div class="header-actions">
          <button type="button" id="load-sample-button" hidden>Load sample</button>
          <button type="button" id="clear-button" hidden>Clear</button>
          <button type="button" class="upload-button" id="upload-button">Upload</button>
          <input
            class="visually-hidden"
            type="file"
            id="file-input"
            accept="application/json,.json"
            aria-label="Choose a manifest.json file"
            tabindex="-1"
          />
        </div>
      </header>

      <main id="app" aria-labelledby="app-heading">
        <h1 id="app-heading" class="visually-hidden">Manifest Lens</h1>
        <div class="inspector-shell" aria-labelledby="inspector-heading">
          <h2 id="inspector-heading" class="visually-hidden">Manifest Lens workspace</h2>
          <div id="inspector-host"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
