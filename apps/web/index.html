<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manifest Inspector</title>
    <style>
      :root {
        color-scheme: dark;
        --color-bg-canvas: #121214;
        --color-bg-tree-pane: #16161a;
        --color-bg-panel: #1b1b20;
        --color-bg-header: #0d0d0f;
        --color-bg-elevated: #202027;
        --color-border-hairline: #2a2a31;
        --color-border-focus: #5eead4;
        --color-text-primary: #ededef;
        --color-text-secondary: #a6a6ae;
        --color-text-tertiary: #6e6e78;
        --color-text-explanation: #d9d9de;
        --color-accent-primary: #5eead4;
        --color-accent-error: #f87171;
        --font-sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        color: var(--color-text-primary);
        background:
          radial-gradient(circle at 16% -10%, rgba(94, 234, 212, 0.08), transparent 30rem),
          linear-gradient(180deg, #121214 0%, #0f0f12 100%);
        font-family: var(--font-sans);
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      button:focus-visible,
      textarea:focus-visible,
      input:focus-visible,
      .upload-button:focus-within,
      .upload-button:has(+ #file-input:focus-visible) {
        outline: 2px solid var(--color-border-focus);
        outline-offset: 2px;
      }

      #file-input:focus-visible {
        outline: 0;
      }

      .app-frame {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 10;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 24px;
        background: var(--color-bg-header);
        border-bottom: 1px solid var(--color-border-hairline);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 8px;
        height: 8px;
        flex: none;
        border-radius: 999px;
        background: var(--color-accent-primary);
        box-shadow: 0 0 20px rgba(94, 234, 212, 0.48);
      }

      .brand-name {
        margin: 0;
        color: var(--color-text-primary);
        font-size: 16px;
        font-weight: 600;
        line-height: 24px;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }

      .header-status {
        margin: 0;
        color: var(--color-text-secondary);
        font-size: 13px;
        line-height: 20px;
      }

      .header-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        flex: none;
      }

      button,
      .upload-button {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        line-height: 20px;
      }

      #clear-button {
        color: var(--color-text-secondary);
        background: transparent;
      }

      #clear-button:hover {
        color: var(--color-text-primary);
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      .upload-button,
      #analyze-button {
        color: var(--color-bg-header);
        background: var(--color-accent-primary);
      }

      .upload-button:hover,
      #analyze-button:hover {
        filter: brightness(1.08);
      }

      .visually-hidden {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        margin: -1px !important;
        padding: 0 !important;
        overflow: hidden !important;
        clip-path: inset(50%) !important;
        border: 0 !important;
        white-space: nowrap !important;
      }

      #app {
        width: min(1440px, 100%);
        min-height: calc(100vh - 56px);
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        padding: 16px;
      }

      .control-dock {
        display: grid;
        grid-template-columns: minmax(18rem, 32rem) auto minmax(12rem, 1fr);
        gap: 12px;
        align-items: end;
        padding: 12px;
        background: var(--color-bg-panel);
        border: 1px solid var(--color-border-hairline);
        border-bottom: 0;
        border-radius: 10px 10px 0 0;
      }

      .input-group {
        display: grid;
        gap: 6px;
      }

      label[for="manifest-input"] {
        color: var(--color-text-tertiary);
        font-size: 11px;
        font-weight: 600;
        line-height: 16px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      #manifest-input {
        width: 100%;
        min-height: 72px;
        max-height: 128px;
        resize: vertical;
        padding: 10px 12px;
        color: var(--color-text-primary);
        background: var(--color-bg-tree-pane);
        border: 1px solid var(--color-border-hairline);
        border-radius: 6px;
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 20px;
      }

      #manifest-input::placeholder {
        color: var(--color-text-tertiary);
      }

      .dock-copy {
        margin: 0;
        color: var(--color-text-secondary);
        font-size: 13px;
        line-height: 20px;
      }

      #status-message {
        min-height: 20px;
        margin: 0;
        justify-self: end;
        color: var(--color-text-secondary);
        font-size: 13px;
        line-height: 20px;
      }

      #status-message:not(:empty) {
        max-width: 100%;
        padding: 7px 10px;
        background: var(--color-bg-elevated);
        border: 1px solid var(--color-border-hairline);
        border-radius: 6px;
      }

      #status-message[data-kind="error"] {
        color: var(--color-accent-error);
      }

      .inspector-shell {
        min-height: 0;
        background: var(--color-bg-tree-pane);
        border: 1px solid var(--color-border-hairline);
        border-radius: 0 0 10px 10px;
        overflow: hidden;
      }

      #inspector-host,
      #inspector-host manifest-inspector {
        min-height: calc(100vh - 176px);
      }

      @media (max-width: 900px) {
        .app-header {
          padding: 0 16px;
        }

        .header-status {
          display: none;
        }

        #app {
          padding: 12px;
        }

        .control-dock {
          grid-template-columns: 1fr auto;
        }

        .dock-copy,
        #status-message {
          grid-column: 1 / -1;
          justify-self: start;
        }
      }

      @media (max-width: 640px) {
        .app-header {
          height: 48px;
          gap: 10px;
        }

        .brand-name {
          font-size: 14px;
        }

        .header-actions {
          gap: 6px;
        }

        #clear-button {
          padding-inline: 10px;
        }

        .upload-button {
          padding-inline: 12px;
        }

        #app {
          min-height: calc(100vh - 48px);
          padding: 8px;
        }

        .control-dock {
          grid-template-columns: 1fr;
          border-radius: 8px 8px 0 0;
        }

        #analyze-button {
          width: 100%;
        }

        .inspector-shell {
          border-radius: 0 0 8px 8px;
        }

        #inspector-host,
        #inspector-host manifest-inspector {
          min-height: calc(100vh - 248px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-frame">
      <header class="app-header">
        <div class="brand" aria-label="Manifest Inspector">
          <span class="brand-mark" aria-hidden="true"></span>
          <p class="brand-name">Manifest Inspector</p>
        </div>
        <p class="header-status">Local-first manifest explanations</p>
        <div class="header-actions">
          <button type="button" id="clear-button">Clear</button>
          <label class="upload-button" for="file-input">Upload</label>
          <input
            class="visually-hidden"
            type="file"
            id="file-input"
            accept="application/json,.json"
            aria-label="Choose a manifest.json file"
          />
        </div>
      </header>

      <main id="app" aria-labelledby="app-heading">
        <h1 id="app-heading" class="visually-hidden">Manifest Inspector</h1>
        <section class="control-dock" aria-labelledby="input-heading">
          <div class="input-group">
            <h2 id="input-heading" class="visually-hidden">Load a manifest</h2>
            <label for="manifest-input">Paste manifest JSON</label>
            <textarea
              id="manifest-input"
              rows="3"
              spellcheck="false"
              placeholder='{ "manifest_version": 3, "name": "Example", "version": "1.0.0" }'
            ></textarea>
          </div>
          <button type="button" id="analyze-button">Analyze locally</button>
          <p class="dock-copy">Drop a manifest.json onto the inspector, paste here, or upload a local file.</p>
          <p id="status-message" role="status" aria-live="polite"></p>
        </section>

        <section class="inspector-shell" aria-labelledby="inspector-heading">
          <h2 id="inspector-heading" class="visually-hidden">Manifest inspector workspace</h2>
          <div id="inspector-host"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
